<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дискурс</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-header">
      <div>
        <h1>Дискурс</h1>
        <p id="sidebar-stats">Читать (<span id="stat-pages">…</span>) и слушать (<span id="stat-audio">…</span>) <a id="more-projects" href="12345.htm">(еще)</a></p>
      </div>
      <button id="toc-close" type="button" aria-label="Закрыть оглавление">×</button>
    </div>
    <nav id="toc" aria-label="Оглавление"></nav>
  </aside>
  <div id="toc-backdrop" hidden></div>

  <main id="main">
    <article id="reader">
      <div id="page-meta"></div>
      <h2 id="page-title"></h2>
      <div id="content"></div>
      <section id="feedback-block" aria-label="Обратная связь">
        <p>Есть замечание или вопрос по этой странице?</p>
        <button id="feedback-open-page" type="button">Написать автору</button>
      </section>
    </article>
  </main>

  <footer id="player">
    <div class="player-row player-row-main">
      <div id="player-info"></div>
      <button id="toc-open" type="button" title="Оглавление" aria-label="Оглавление">☰</button>
      <button id="copy-link" type="button" title="Скопировать ссылку на страницу" aria-label="Скопировать ссылку">🔗</button>
      <div id="player-controls">
        <button id="prev-btn" type="button" title="Предыдущая страница" aria-label="Назад">◀</button>
        <button id="play-btn" class="primary" type="button">▶ Слушать</button>
        <button id="next-btn" type="button" title="Следующая страница" aria-label="Вперёд">▶</button>
      </div>
    </div>
    <div class="player-row player-row-meta">
      <div id="progress-wrap">
        <input id="progress" type="range" min="0" max="100" value="0" step="0.1">
        <span id="time">0:00 / 0:00</span>
      </div>
      <label id="auto-label">
        <input id="auto-advance" type="checkbox">
        <span class="auto-text-full">Автопереход</span>
        <span class="auto-text-short" hidden>Авто</span>
      </label>
      <span id="no-audio" hidden>Записи для этой страницы пока нет</span>
      <button id="feedback-open-player" type="button" title="Обратная связь" aria-label="Отзыв">✉</button>
    </div>
  </footer>

  <div id="feedback-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-labelledby="feedback-title" aria-modal="true">
      <button class="modal-close" type="button" data-close aria-label="Закрыть">×</button>
      <h3 id="feedback-title">Обратная связь</h3>
      <p id="feedback-context" class="modal-context"></p>
      <form id="feedback-form">
        <label>
          Ваше имя <span class="optional">(необязательно)</span>
          <input name="name" type="text" autocomplete="name">
        </label>
        <label>
          Email для ответа <span class="optional">(необязательно)</span>
          <input name="reply_email" type="email" autocomplete="email">
        </label>
        <label>
          Сообщение
          <textarea name="message" rows="5" required placeholder="Замечание, вопрос, опечатка…"></textarea>
        </label>
        <input type="text" name="_honey" class="honey" tabindex="-1" autocomplete="off">
        <div id="feedback-status" class="feedback-status" hidden></div>
        <div class="modal-actions">
          <button type="button" data-close>Отмена</button>
          <button type="submit" class="primary">Отправить</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js?v=7"></script>
</body>
</html>
