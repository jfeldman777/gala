<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дискурс</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>Дискурс</h1>
      <p>Читать и слушать</p>
    </div>
    <nav id="toc" aria-label="Оглавление"></nav>
  </aside>

  <main id="main">
    <article id="reader">
      <div id="page-meta"></div>
      <h2 id="page-title"></h2>
      <div id="content"></div>
    </article>
  </main>

  <footer id="player">
    <div id="player-info"></div>
    <div id="player-controls">
      <button id="prev-btn" type="button" title="Предыдущая страница">←</button>
      <button id="play-btn" class="primary" type="button">▶ Слушать</button>
      <button id="next-btn" type="button" title="Следующая страница">→</button>
    </div>
    <div id="progress-wrap">
      <input id="progress" type="range" min="0" max="100" value="0" step="0.1">
      <span id="time">0:00 / 0:00</span>
    </div>
    <label id="auto-label">
      <input id="auto-advance" type="checkbox">
      Автопереход
    </label>
    <span id="no-audio" hidden>Записи для этой страницы пока нет</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
