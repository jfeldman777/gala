<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>More projects — Feldman's Discourse</title>
  <style>
    :root {
      --bg: #f7f3eb;
      --paper: #fffdf8;
      --ink: #2c2416;
      --muted: #6b5f4d;
      --accent: #8b4513;
      --border: #e0d4c4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--ink);
      padding: 2rem 1.25rem 3rem;
    }
    main {
      max-width: 40rem;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem 1.5rem 2rem;
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.6rem;
    }
    .lead {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .back {
      display: inline-block;
      margin-bottom: 1.25rem;
      color: var(--accent);
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
    .project {
      margin: 0 0 1.35rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid var(--border);
    }
    .project:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .project h2 {
      margin: 0 0 0.35rem;
      font-size: 1.15rem;
      color: var(--accent);
    }
    .project p {
      margin: 0 0 0.55rem;
      line-height: 1.5;
    }
    .project a {
      color: var(--accent);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="en.html">← Back to Discourse</a>
    <h1>More projects</h1>
    <p class="lead">Repositories with an English edition (more coming later)</p>

    <section class="project">
      <h2>gala</h2>
      <p>Scattered book — for the girl Gala</p>
      <p><a href="https://jfeldman777.github.io/gala/en.html">jfeldman777.github.io/gala/en.html</a></p>
    </section>

    <section class="project">
      <h2>man</h2>
      <p>Maneuvers, quads, plays — see <a href="en.html?p=3.7.3">3.7.3. Maneuvers, expanded</a></p>
      <p><a href="https://jfeldman777.github.io/man/?lang=en">jfeldman777.github.io/man/</a></p>
    </section>
  </main>
</body>
</html>
