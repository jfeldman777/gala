<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feldman's Discourse</title>
  <meta property="og:title" content="Feldman's Discourse">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:title" content="Feldman's Discourse">
  <link rel="stylesheet" href="style.css?v=38">
</head>
<body class="lang-en">
  <div id="cover-screen" class="cover-hidden" aria-hidden="true">
    <button type="button" id="cover-enter" class="cover-image-btn" title="Open the book" aria-label="Open the book" data-i18n-title="coverEnter" data-i18n-aria="coverEnter">
      <span class="cover-text">
        <span class="cover-line" data-i18n="coverLine1">Feldman's</span>
        <span class="cover-line" data-i18n="coverLine2">Discourse</span>
        <span class="cover-years">1989-2026</span>
      </span>
    </button>
    <div class="cover-actions">
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" class="lang-btn" data-lang="ru" title="Русский">RU</button>
        <button type="button" class="lang-btn active" data-lang="en" title="English">EN</button>
      </div>
      <button type="button" id="cover-toc" title="Table of contents" aria-label="Table of contents" data-i18n-title="toc" data-i18n-aria="toc">☰</button>
      <button type="button" id="cover-link" title="Copy cover link" aria-label="Copy link" data-i18n-title="copyCover" data-i18n-aria="copyLink">🔗</button>
      <button type="button" id="cover-changes" title="What's new" aria-label="What's new" data-i18n-title="whatsNew" data-i18n-aria="whatsNew">✦</button>
    </div>
  </div>

  <aside id="sidebar">
    <div id="sidebar-header">
      <div>
        <button type="button" id="cover-home" class="cover-home-btn" title="To cover" aria-label="To cover" data-i18n-title="toCover" data-i18n-aria="toCover">
          <span class="cover-home-title" data-i18n="bookTitle">Feldman's Discourse</span>
          <span class="cover-home-hint" data-i18n="coverHint">cover</span>
        </button>
        <p id="sidebar-stats"><span data-i18n="statsRead">Read</span> (<span id="stat-pages">…</span>)<span id="stats-listen-wrap"> <span data-i18n="statsAndListen">and listen</span> (<span id="stat-audio">…</span>)</span> <a id="more-projects" href="12345.htm" data-i18n="more">(more)</a>
          <button type="button" id="sidebar-changes" class="sidebar-changes-btn" title="What's new" data-i18n="whatsNew" data-i18n-title="whatsNew">What's new</button>
        </p>
        <div class="lang-switch sidebar-lang" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang="ru" title="Русский">RU</button>
          <button type="button" class="lang-btn active" data-lang="en" title="English">EN</button>
        </div>
      </div>
      <button id="toc-close" type="button" aria-label="Close table of contents">×</button>
    </div>
    <div id="toc-search-wrap">
      <span class="search-loupe" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="6.5"></circle>
          <path d="M20 20l-3.2-3.2"></path>
        </svg>
      </span>
      <input id="toc-search" type="search" placeholder="Search the book…" autocomplete="off" spellcheck="false" data-i18n-placeholder="tocSearch">
    </div>
    <p id="toc-search-empty" hidden data-i18n="tocSearchEmpty">Nothing found</p>
    <nav id="toc" aria-label="Table of contents" data-i18n-aria="toc"></nav>
  </aside>
  <div id="toc-backdrop" hidden></div>

  <main id="main">
    <article id="reader">
      <div id="reader-top">
        <div id="page-meta"></div>
        <button id="page-find-open" type="button" title="Find on page (Ctrl+F)" aria-label="Find on page" data-i18n-title="pageFind" data-i18n-aria="pageFindShort">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M20 20l-3.2-3.2"></path>
          </svg>
        </button>
      </div>
      <div id="page-find-bar" hidden>
        <input id="page-find-input" type="search" placeholder="Find on this page…" autocomplete="off" spellcheck="false" data-i18n-placeholder="pageFindInput">
        <span id="page-find-count"></span>
        <button id="page-find-prev" type="button" title="Previous" aria-label="Previous match" data-i18n-title="prevMatch" data-i18n-aria="prevMatch">↑</button>
        <button id="page-find-next" type="button" title="Next" aria-label="Next match" data-i18n-title="nextMatch" data-i18n-aria="nextMatch">↓</button>
        <button id="page-find-close" type="button" title="Close" aria-label="Close find" data-i18n-title="close" data-i18n-aria="closeFind">×</button>
      </div>
      <h2 id="page-title"></h2>
      <div id="content"></div>
      <section id="feedback-block" aria-label="Feedback" data-i18n-aria="feedback">
        <label class="reader-name-wrap">
          <span data-i18n="yourName">Your name</span>
          <input id="reader-name" type="text" name="reader_name" autocomplete="name" placeholder="for likes and mail to the author" maxlength="80" data-i18n-placeholder="namePlaceholder">
        </label>
        <div id="vote-block">
          <p class="vote-prompt" data-i18n="pageUseful">Is this page useful?</p>
          <div class="vote-actions">
            <button id="vote-like" type="button" title="Like" data-i18n-title="like">👍</button>
            <button id="vote-dislike" type="button" title="Dislike" data-i18n-title="dislike">👎</button>
          </div>
          <p id="vote-status" class="vote-status" hidden></p>
        </div>
        <p data-i18n="haveComment">A note or question about this page?</p>
        <button id="feedback-open-page" type="button" data-i18n="writeAuthor">Write to the author</button>
      </section>
    </article>
  </main>

  <footer id="player">
    <div class="player-row player-row-main">
      <div id="player-info"></div>
      <button id="toc-open" type="button" title="Table of contents" aria-label="Table of contents" data-i18n-title="toc" data-i18n-aria="toc">☰</button>
      <button id="copy-link" type="button" title="Copy page link" aria-label="Copy link" data-i18n-title="copyPage" data-i18n-aria="copyLink">🔗</button>
      <div id="player-controls">
        <button id="prev-btn" type="button" title="Previous page" aria-label="Back" data-i18n-title="prevPage" data-i18n-aria="back">◀</button>
        <button id="play-btn" class="primary" type="button" hidden>▶ Listen</button>
        <button id="next-btn" type="button" title="Next page" aria-label="Forward" data-i18n-title="nextPage" data-i18n-aria="forward">▶</button>
      </div>
    </div>
    <div class="player-row player-row-meta">
      <div id="progress-wrap" hidden>
        <input id="progress" type="range" min="0" max="100" value="0" step="0.1">
        <span id="time">0:00 / 0:00</span>
      </div>
      <label id="auto-label" hidden>
        <input id="auto-advance" type="checkbox">
        <span class="auto-text-full" data-i18n="autoAdvance">Auto-advance</span>
        <span class="auto-text-short" hidden data-i18n="autoShort">Auto</span>
      </label>
      <span id="no-audio" hidden data-i18n="noAudio">No recording for this page yet</span>
    </div>
  </footer>

  <div id="feedback-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-labelledby="feedback-title" aria-modal="true">
      <button class="modal-close" type="button" data-close aria-label="Close" data-i18n-aria="close">×</button>
      <h3 id="feedback-title" data-i18n="feedback">Feedback</h3>
      <p id="feedback-context" class="modal-context"></p>
      <form id="feedback-form">
        <label>
          <span data-i18n="yourName">Your name</span>
          <input name="name" type="text" autocomplete="name" required maxlength="80">
        </label>
        <label>
          <span data-i18n="replyEmail">Email for a reply</span> <span class="optional" data-i18n="optional">(optional)</span>
          <input name="reply_email" type="email" autocomplete="email">
        </label>
        <label>
          <span data-i18n="message">Message</span>
          <textarea name="message" rows="5" required placeholder="Note, question, typo…" data-i18n-placeholder="messagePlaceholder"></textarea>
        </label>
        <input type="text" name="_honey" class="honey" tabindex="-1" autocomplete="off">
        <div id="feedback-status" class="feedback-status" hidden></div>
        <div class="modal-actions">
          <button type="button" data-close data-i18n="cancel">Cancel</button>
          <button type="submit" class="primary" data-i18n="send">Send</button>
        </div>
      </form>
    </div>
  </div>

  <div id="changes-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close-changes></div>
    <div class="modal-card changes-card" role="dialog" aria-labelledby="changes-title" aria-modal="true">
      <button class="modal-close" type="button" data-close-changes aria-label="Close" data-i18n-aria="close">×</button>
      <h3 id="changes-title" data-i18n="whatsNew">What's new</h3>
      <p class="modal-context" data-i18n="changesIntro">Pages added or changed in the selected period.</p>
      <div class="changes-toolbar">
        <label class="changes-period-label">
          <span data-i18n="period">Period</span>
          <select id="changes-period">
            <option value="since" data-i18n="periodSince">since last visit</option>
            <option value="3" data-i18n="period3">3 days</option>
            <option value="7" selected data-i18n="period7">7 days</option>
            <option value="14" data-i18n="period14">14 days</option>
            <option value="30" data-i18n="period30">30 days</option>
            <option value="90" data-i18n="period90">90 days</option>
          </select>
        </label>
        <span id="changes-summary" class="changes-summary"></span>
      </div>
      <div id="changes-list" class="changes-list"></div>
    </div>
  </div>

  <script src="app.js?v=38"></script>
</body>
</html>
